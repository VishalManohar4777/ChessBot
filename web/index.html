<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>C++ Chess Engine — Web UI</title>
<style>
  :root {
    --bg: #1f2127;
    --panel: #2a2d36;
    --text: #e8eaed;
    --muted: #9aa0aa;
    --light: #ebecd0;
    --dark: #739552;
    --sel: rgba(255, 235, 59, 0.55);
    --last: rgba(255, 235, 59, 0.32);
    --dot: rgba(20, 20, 20, 0.28);
    --check: radial-gradient(circle, rgba(255,60,60,0.95) 0%, rgba(255,40,40,0.65) 45%, rgba(255,0,0,0) 75%);
    --accent: #6aa6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px;
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; justify-content: center;
  }
  .app { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
  h1 { font-size: 18px; margin: 0 0 12px; font-weight: 600; }
  .muted { color: var(--muted); }

  .board-wrap { position: relative; }
  .board {
    width: min(90vw, 560px); aspect-ratio: 1 / 1;
    display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
    border-radius: 8px; overflow: hidden; touch-action: none;
    box-shadow: 0 10px 40px rgba(0,0,0,0.45); user-select: none;
  }
  .sq { position: relative; display: flex; align-items: center; justify-content: center; }
  .sq.light { background: var(--light); }
  .sq.dark  { background: var(--dark); }
  .sq.sel::after   { content: ""; position: absolute; inset: 0; background: var(--sel); }
  .sq.last::after  { content: ""; position: absolute; inset: 0; background: var(--last); }
  .sq.check .piece { /* keep piece above */ }
  .sq.check::before {
    content: ""; position: absolute; inset: 0; background: var(--check); z-index: 0;
  }
  .piece {
    position: relative; z-index: 2;
    font-size: min(11vw, 64px); line-height: 1; cursor: grab;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
  }
  .piece.w { color: #ffffff; -webkit-text-stroke: 1.4px #4a4a4a; }
  .piece.b { color: #2b2b2b; -webkit-text-stroke: 1.4px #cfcfcf; }
  .sq .dot {
    position: absolute; width: 30%; height: 30%; border-radius: 50%;
    background: var(--dot); z-index: 1; pointer-events: none;
  }
  .sq .ring {
    position: absolute; inset: 8%; border-radius: 50%;
    border: 6px solid var(--dot); z-index: 1; pointer-events: none;
  }
  .coord {
    position: absolute; font-size: 11px; font-weight: 700; opacity: 0.6; z-index: 3; pointer-events: none;
  }
  .coord.file { right: 3px; bottom: 1px; }
  .coord.rank { left: 3px; top: 1px; }
  .sq.light .coord { color: #739552; }
  .sq.dark  .coord { color: #ebecd0; }

  .ghost {
    position: fixed; z-index: 999; pointer-events: none;
    font-size: min(11vw, 64px); line-height: 1; transform: translate(-50%, -50%);
    text-shadow: 0 4px 8px rgba(0,0,0,0.5);
  }
  .ghost.w { color: #ffffff; -webkit-text-stroke: 1.4px #4a4a4a; }
  .ghost.b { color: #2b2b2b; -webkit-text-stroke: 1.4px #cfcfcf; }

  /* Side panel */
  .panel { background: var(--panel); border-radius: 10px; padding: 16px; width: 280px; max-width: 90vw; }
  .status { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; min-height: 24px; }
  .turn-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #888; }
  .turn-dot.w { background: #fff; } .turn-dot.b { background: #2b2b2b; }
  .status.check .status-text { color: #ff6b6b; font-weight: 600; }
  .status.over .status-text { color: var(--accent); font-weight: 600; }
  .spinner {
    width: 14px; height: 14px; border: 2px solid var(--muted); border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite; display: none;
  }
  .spinner.on { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .controls { display: grid; gap: 10px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  label { font-size: 13px; color: var(--muted); }
  select, button {
    background: #363a45; color: var(--text); border: 1px solid #454a57;
    border-radius: 6px; padding: 7px 10px; font-size: 13px; cursor: pointer;
  }
  select { min-width: 130px; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #0b1220; border-color: var(--accent); font-weight: 600; }
  .btns { display: flex; gap: 8px; }
  .btns button { flex: 1; }

  .moves-title { font-size: 13px; color: var(--muted); margin: 6px 0; }
  .moves {
    height: 180px; overflow-y: auto; background: #20232b; border-radius: 6px; padding: 8px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; line-height: 1.7;
  }
  .moves .mv { display: inline-block; min-width: 58px; }
  .moves .num { color: var(--muted); display: inline-block; min-width: 26px; }
  .toast {
    margin-top: 10px; font-size: 12px; color: #ffcf6b; min-height: 16px;
  }

  /* Promotion overlay */
  .promo-backdrop {
    position: absolute; inset: 0; background: rgba(0,0,0,0.45); display: none;
    align-items: center; justify-content: center; z-index: 50; border-radius: 8px;
  }
  .promo-backdrop.on { display: flex; }
  .promo { background: var(--panel); border-radius: 10px; padding: 12px; display: flex; gap: 8px; }
  .promo button { font-size: 40px; padding: 6px 10px; line-height: 1; }
</style>
</head>
<body>
  <div class="app">
    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="promo-backdrop" id="promo">
        <div class="promo" id="promoBtns"></div>
      </div>
    </div>

    <div class="panel">
      <h1>C++ Chess Engine <span class="muted">· web UI</span></h1>

      <div class="status" id="status">
        <span class="turn-dot w" id="turnDot"></span>
        <span class="status-text" id="statusText">White to move</span>
        <span class="spinner" id="spinner"></span>
      </div>

      <div class="controls">
        <div class="row">
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="cpu">Play vs Computer</option>
            <option value="2p">Two players</option>
          </select>
        </div>
        <div class="row" id="sideRow">
          <label for="side">Play as</label>
          <select id="side">
            <option value="w">White</option>
            <option value="b">Black</option>
          </select>
        </div>
        <div class="row" id="timeRow">
          <label for="time">Engine time</label>
          <select id="time">
            <option value="500">0.5 s</option>
            <option value="1000">1 s</option>
            <option value="1500" selected>1.5 s</option>
            <option value="3000">3 s</option>
            <option value="6000">6 s</option>
          </select>
        </div>
      </div>

      <div class="btns">
        <button class="primary" id="newGame">New game</button>
        <button id="undo">Undo</button>
        <button id="flip">Flip</button>
      </div>

      <div class="moves-title">Moves</div>
      <div class="moves" id="moves"></div>
      <div class="toast" id="toast"></div>
    </div>
  </div>

  <script src="chess.js"></script>
  <script>
  (function () {
    "use strict";
    const C = window.Chess;
    const GLYPH = { 1: "♟", 2: "♞", 3: "♝", 4: "♜", 5: "♛", 6: "♚" };

    // ---- DOM ----
    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const statusText = document.getElementById("statusText");
    const turnDot = document.getElementById("turnDot");
    const spinner = document.getElementById("spinner");
    const movesEl = document.getElementById("moves");
    const toastEl = document.getElementById("toast");
    const promoEl = document.getElementById("promo");
    const promoBtns = document.getElementById("promoBtns");
    const modeSel = document.getElementById("mode");
    const sideSel = document.getElementById("side");
    const timeSel = document.getElementById("time");
    const sideRow = document.getElementById("sideRow");
    const timeRow = document.getElementById("timeRow");

    // ---- Game state ----
    let history = [C.startPosition()];   // stack of states
    let sanList = [];                    // {san, from, to}
    let selected = null;                 // selected square or null
    let targets = new Map();             // to -> [moves]
    let orientation = C.WHITE;           // side at the bottom
    let mode = "cpu";
    let humanColor = C.WHITE;
    let thinking = false;
    let gameOver = false;
    let lastMove = null;                 // {from, to}

    const cur = () => history[history.length - 1];
    const isHumanTurn = () =>
      !gameOver && !thinking && (mode === "2p" || cur().side === humanColor);

    // ---- Build the 64 squares once ----
    const cells = [];
    for (let i = 0; i < 64; i++) {
      const d = document.createElement("div");
      d.className = "sq";
      boardEl.appendChild(d);
      cells.push(d);
    }

    function sqForCell(i) {
      const r = i >> 3, c = i % 8;
      if (orientation === C.WHITE) return (7 - r) * 8 + c;
      return r * 8 + (7 - c);
    }

    function render() {
      const s = cur();
      const checkSq = C.inCheck(s, s.side) ? C.kingSquare(s, s.side) : -1;
      for (let i = 0; i < 64; i++) {
        const sq = sqForCell(i);
        const cell = cells[i];
        const rank = sq >> 3, file = sq % 8;
        let cls = "sq " + ((rank + file) % 2 === 0 ? "dark" : "light");
        if (sq === selected) cls += " sel";
        if (lastMove && (sq === lastMove.from || sq === lastMove.to)) cls += " last";
        if (sq === checkSq) cls += " check";
        cell.className = cls;
        cell.dataset.sq = sq;

        let html = "";
        const p = s.board[sq];
        if (p !== 0) {
          const col = p > 0 ? "w" : "b";
          html += `<span class="piece ${col}">${GLYPH[C.pieceType(p)]}</span>`;
        }
        if (targets.has(sq)) {
          html += (p !== 0 || isEpTarget(sq)) ? `<span class="ring"></span>` : `<span class="dot"></span>`;
        }
        // coordinate labels
        if (i % 8 === 0) html += `<span class="coord rank">${rank + 1}</span>`;
        if (i >= 56) html += `<span class="coord file">${String.fromCharCode(97 + file)}</span>`;
        cell.innerHTML = html;
      }
    }

    function isEpTarget(sq) {
      if (!targets.has(sq)) return false;
      return targets.get(sq).some((m) => m.flag === C.FLAG_ENPASSANT);
    }

    function select(sq) {
      selected = sq;
      targets = new Map();
      for (const m of C.legalMovesFrom(cur(), sq)) {
        if (!targets.has(m.to)) targets.set(m.to, []);
        targets.get(m.to).push(m);
      }
      render();
    }
    function deselect() { selected = null; targets = new Map(); render(); }

    // ---- SAN for the move list ----
    function toSAN(state, move) {
      if (move.flag === C.FLAG_CASTLE_K) return decorate(state, move, "O-O");
      if (move.flag === C.FLAG_CASTLE_Q) return decorate(state, move, "O-O-O");
      const type = C.pieceType(move.piece);
      const dest = C.squareName(move.to);
      const capture = move.captured !== 0;
      let s;
      if (type === C.PAWN) {
        s = capture ? C.squareName(move.from)[0] + "x" + dest : dest;
        if (move.flag === C.FLAG_PROMO) s += "=" + "NBRQ"[move.promotion - 2];
      } else {
        const letter = "NBRQK"[type - 2];
        // disambiguation
        let sameFile = false, sameRank = false, ambig = false;
        for (const m of C.legalMoves(state)) {
          if (m.to === move.to && m.from !== move.from && C.pieceType(m.piece) === type) {
            ambig = true;
            if (m.from % 8 === move.from % 8) sameFile = true;
            if (m.from >> 3 === move.from >> 3) sameRank = true;
          }
        }
        let dis = "";
        if (ambig) {
          if (!sameFile) dis = C.squareName(move.from)[0];
          else if (!sameRank) dis = C.squareName(move.from)[1];
          else dis = C.squareName(move.from);
        }
        s = letter + dis + (capture ? "x" : "") + dest;
      }
      return decorate(state, move, s);
    }
    function decorate(state, move, s) {
      const ns = C.makeMove(state, move);
      const st = C.status(ns);
      if (st.over && st.reason === "checkmate") return s + "#";
      if (st.check) return s + "+";
      return s;
    }

    function renderMoves() {
      let html = "";
      for (let i = 0; i < sanList.length; i++) {
        if (i % 2 === 0) html += `<span class="num">${i / 2 + 1}.</span>`;
        html += `<span class="mv">${sanList[i].san}</span>`;
      }
      movesEl.innerHTML = html;
      movesEl.scrollTop = movesEl.scrollHeight;
    }

    function updateStatus() {
      const s = cur();
      const st = C.status(s);
      statusEl.classList.remove("check", "over");
      turnDot.className = "turn-dot " + (s.side === C.WHITE ? "w" : "b");
      if (st.over) {
        gameOver = true;
        statusEl.classList.add("over");
        if (st.reason === "checkmate")
          statusText.textContent = (st.winner === C.WHITE ? "White" : "Black") + " wins by checkmate";
        else if (st.reason === "stalemate") statusText.textContent = "Draw — stalemate";
        else statusText.textContent = "Draw — 50-move rule";
        return;
      }
      gameOver = false;
      let txt = (s.side === C.WHITE ? "White" : "Black") + " to move";
      if (thinking) txt = "Engine is thinking…";
      else if (st.check) { txt += " — check!"; statusEl.classList.add("check"); }
      statusText.textContent = txt;
    }

    // ---- Apply a move ----
    function applyMove(move) {
      const s = cur();
      const san = toSAN(s, move);
      const ns = C.makeMove(s, move);
      history.push(ns);
      sanList.push({ san, from: move.from, to: move.to });
      lastMove = { from: move.from, to: move.to };
      deselect();
      renderMoves();
      updateStatus();
      if (!gameOver && mode === "cpu" && ns.side !== humanColor) {
        setTimeout(engineMove, 150);
      }
    }

    function tryMoveTo(to) {
      const ms = targets.get(to);
      if (!ms || !ms.length) return;
      if (ms.length === 1) { applyMove(ms[0]); return; }
      // promotion: ask which piece
      showPromotion(cur().side).then((pt) => {
        const mv = ms.find((m) => m.promotion === pt) || ms[0];
        applyMove(mv);
      });
    }

    // ---- Engine bridge ----
    async function engineMove() {
      if (mode !== "cpu" || gameOver) return;
      thinking = true; spinner.classList.add("on"); updateStatus();
      toast("");
      try {
        const fen = C.toFEN(cur());
        const movetime = parseInt(timeSel.value, 10);
        const resp = await fetch("/bestmove", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ fen, movetime })
        });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();
        const move = C.moveFromUci(cur(), data.bestmove);
        thinking = false; spinner.classList.remove("on");
        if (!move) throw new Error("Engine returned illegal move: " + data.bestmove);
        applyMove(move);
      } catch (err) {
        thinking = false; spinner.classList.remove("on"); updateStatus();
        toast("⚠ Engine unavailable. Start the bridge: python server.py  (" + err.message + ")");
      }
    }

    function toast(msg) { toastEl.textContent = msg; }

    // ---- Promotion picker ----
    let promoResolve = null;
    function showPromotion(color) {
      promoBtns.innerHTML = "";
      [C.QUEEN, C.ROOK, C.BISHOP, C.KNIGHT].forEach((pt) => {
        const b = document.createElement("button");
        b.innerHTML = `<span class="piece ${color === C.WHITE ? "w" : "b"}">${GLYPH[pt]}</span>`;
        b.onclick = () => { promoEl.classList.remove("on"); if (promoResolve) promoResolve(pt); };
        promoBtns.appendChild(b);
      });
      promoEl.classList.add("on");
      return new Promise((res) => (promoResolve = res));
    }

    // ---- Pointer (mouse + touch) interaction ----
    let dragFrom = null, dragging = false, ghost = null, startX = 0, startY = 0;
    const DRAG_THRESHOLD = 6;

    function squareFromPoint(x, y) {
      const el = document.elementFromPoint(x, y);
      if (!el) return -1;
      const sqEl = el.closest(".sq");
      if (!sqEl) return -1;
      return parseInt(sqEl.dataset.sq, 10);
    }
    function ownPiece(sq) {
      const p = cur().board[sq];
      return p !== 0 && C.pieceColor(p) === cur().side;
    }

    boardEl.addEventListener("pointerdown", (e) => {
      if (!isHumanTurn()) return;
      const sq = squareFromPoint(e.clientX, e.clientY);
      if (sq < 0) return;
      e.preventDefault();

      if (selected !== null && targets.has(sq)) { tryMoveTo(sq); return; }
      if (ownPiece(sq)) {
        select(sq);
        dragFrom = sq; dragging = false; startX = e.clientX; startY = e.clientY;
        boardEl.setPointerCapture(e.pointerId);
      } else {
        deselect();
      }
    });

    boardEl.addEventListener("pointermove", (e) => {
      if (dragFrom === null) return;
      if (!dragging) {
        if (Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY) < DRAG_THRESHOLD) return;
        dragging = true;
        const p = cur().board[dragFrom];
        ghost = document.createElement("div");
        ghost.className = "ghost " + (p > 0 ? "w" : "b");
        ghost.textContent = GLYPH[C.pieceType(p)];
        document.body.appendChild(ghost);
      }
      ghost.style.left = e.clientX + "px";
      ghost.style.top = e.clientY + "px";
    });

    boardEl.addEventListener("pointerup", (e) => {
      if (dragFrom === null) return;
      const wasDragging = dragging;
      const target = squareFromPoint(e.clientX, e.clientY);
      cleanupDrag();
      if (wasDragging && target >= 0 && target !== dragFromCache && targets.has(target)) {
        tryMoveTo(target);
      }
      // if it was just a tap (no drag), selection already shown — keep it
    });

    let dragFromCache = null;
    function cleanupDrag() {
      dragFromCache = dragFrom;
      if (ghost) { ghost.remove(); ghost = null; }
      dragging = false; dragFrom = null;
    }

    // ---- Controls ----
    function newGame() {
      history = [C.startPosition()];
      sanList = []; selected = null; targets = new Map();
      lastMove = null; gameOver = false; thinking = false;
      spinner.classList.remove("on"); toast("");
      mode = modeSel.value;
      humanColor = sideSel.value === "b" ? C.BLACK : C.WHITE;
      orientation = (mode === "cpu") ? humanColor : C.WHITE;
      sideRow.style.display = mode === "cpu" ? "" : "none";
      timeRow.style.display = mode === "cpu" ? "" : "none";
      renderMoves(); render(); updateStatus();
      if (mode === "cpu" && cur().side !== humanColor) setTimeout(engineMove, 250);
    }

    function undo() {
      if (thinking) return;
      const plies = (mode === "cpu") ? 2 : 1;
      for (let i = 0; i < plies && history.length > 1; i++) {
        history.pop(); sanList.pop();
      }
      gameOver = false;
      const last = sanList[sanList.length - 1];
      lastMove = last ? { from: last.from, to: last.to } : null;
      deselect(); renderMoves(); updateStatus();
      // Keep the position playable if we landed on the engine's turn.
      if (mode === "cpu" && !gameOver && cur().side !== humanColor) {
        setTimeout(engineMove, 250);
      }
    }

    document.getElementById("newGame").onclick = newGame;
    document.getElementById("undo").onclick = undo;
    document.getElementById("flip").onclick = () => { orientation ^= 1; render(); };
    modeSel.onchange = newGame;
    sideSel.onchange = newGame;

    // ---- Start ----
    newGame();
  })();
  </script>
</body>
</html>
